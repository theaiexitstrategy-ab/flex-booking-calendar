<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manage Your Booking — The FLEX Facility</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;500;600;700&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #080808; --off-black: #111111; --card-bg: #141414;
    --border: rgba(255,255,255,0.08); --border-light: rgba(255,255,255,0.15);
    --white: #ffffff; --muted: #999999;
    --accent-gold: #d4a017; --accent-red: #E8200A;
    --text: #F5F5F5; --success: #22c55e;
    --radius: 12px; --radius-sm: 8px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--black); color: var(--text); font-family: 'Barlow', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 40px; max-width: 480px; width: 100%; }
  .logo { font-family: 'Bebas Neue', sans-serif; font-size: 24px; letter-spacing: 2px; color: var(--white); text-align: center; margin-bottom: 8px; }
  .subtitle { text-align: center; font-size: 13px; color: var(--muted); margin-bottom: 32px; letter-spacing: 1px; }
  .loading { text-align: center; color: var(--muted); padding: 40px 0; }
  .spinner { display: inline-block; width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--accent-gold); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .booking-info { margin-bottom: 28px; }
  .info-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--border); font-size: 14px; }
  .info-row:last-child { border-bottom: none; }
  .info-label { color: var(--muted); font-size: 12px; letter-spacing: 1px; text-transform: uppercase; }
  .info-value { color: var(--white); font-weight: 600; }
  .status-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; }
  .status-Scheduled, .status-Confirmed { background: rgba(34,197,94,0.15); color: var(--success); }
  .status-Rescheduled { background: rgba(212,160,23,0.15); color: var(--accent-gold); }
  .status-Cancelled { background: rgba(232,32,10,0.15); color: var(--accent-red); }
  .actions { display: flex; flex-direction: column; gap: 12px; }
  .btn { width: 100%; padding: 14px; border: none; border-radius: var(--radius-sm); font-family: 'Bebas Neue', sans-serif; font-size: 16px; letter-spacing: 2px; cursor: pointer; transition: all 0.2s; text-align: center; }
  .btn-reschedule { background: var(--accent-gold); color: var(--black); }
  .btn-reschedule:hover { filter: brightness(1.1); }
  .btn-cancel { background: transparent; color: var(--accent-red); border: 1px solid rgba(232,32,10,0.4); }
  .btn-cancel:hover { background: rgba(232,32,10,0.1); }
  .btn-rebook { background: var(--white); color: var(--black); }
  .btn-rebook:hover { background: var(--accent-gold); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .error-msg { text-align: center; color: var(--accent-red); padding: 20px 0; }
  .success-msg { text-align: center; color: var(--success); padding: 20px 0; font-size: 16px; }
  .reschedule-form { display: none; margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--border); }
  .form-label { display: block; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); font-weight: 600; margin-bottom: 8px; }
  .form-input { width: 100%; background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px 14px; color: var(--text); font-family: 'Barlow', sans-serif; font-size: 14px; outline: none; margin-bottom: 16px; }
  .form-input:focus { border-color: var(--accent-gold); }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">THE FLEX FACILITY</div>
  <div class="subtitle">Manage Your Booking</div>

  <div id="loading" class="loading">
    <div class="spinner"></div>
    <p style="margin-top:12px">Loading your booking...</p>
  </div>

  <div id="content" style="display:none">
    <div id="booking-details"></div>
    <div id="actions"></div>
  </div>

  <div id="error" style="display:none" class="error-msg"></div>
</div>

<script>
var bookingId = new URLSearchParams(window.location.search).get('id');

if (!bookingId) {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('error').style.display = 'block';
  document.getElementById('error').textContent = 'No booking ID provided. Check the link in your SMS.';
} else {
  loadBooking();
}

function loadBooking() {
  // Use the health endpoint to verify connection, then fetch from Supabase via a lookup endpoint
  // Since we don't have a dedicated lookup endpoint, we'll use the slots endpoint pattern
  // Actually, let's call a simple GET to our bookings with the ID
  fetch('/api/lookup?id=' + bookingId)
    .then(function(r) { return r.json(); })
    .then(function(data) {
      document.getElementById('loading').style.display = 'none';
      if (!data.success || !data.data) {
        document.getElementById('error').style.display = 'block';
        document.getElementById('error').textContent = data.error || 'Booking not found.';
        return;
      }
      renderBooking(data.data);
    })
    .catch(function(err) {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('error').style.display = 'block';
      document.getElementById('error').textContent = 'Could not load booking. Please try again.';
    });
}

function renderBooking(b) {
  var name = b.first_name || b.name || b.contact_name || 'Unknown';
  var date = b.booking_date || b.date || '';
  var time = b.booking_time || b.time || '';
  var session = b.session_name || b.session_type || '';
  var status = b.status || 'Scheduled';
  var isCancelled = status === 'Cancelled';

  document.getElementById('content').style.display = 'block';

  document.getElementById('booking-details').innerHTML =
    '<div class="booking-info">' +
      '<div class="info-row"><span class="info-label">Name</span><span class="info-value">' + name + '</span></div>' +
      '<div class="info-row"><span class="info-label">Session</span><span class="info-value">' + session + '</span></div>' +
      '<div class="info-row"><span class="info-label">Date</span><span class="info-value">' + date + '</span></div>' +
      '<div class="info-row"><span class="info-label">Time</span><span class="info-value">' + time + '</span></div>' +
      '<div class="info-row"><span class="info-label">Status</span><span class="info-value"><span class="status-badge status-' + status + '">' + status + '</span></span></div>' +
    '</div>';

  if (isCancelled) {
    document.getElementById('actions').innerHTML =
      '<div class="success-msg">This booking has been cancelled.</div>' +
      '<div class="actions"><a href="/" class="btn btn-rebook">BOOK A NEW SESSION</a></div>';
  } else {
    document.getElementById('actions').innerHTML =
      '<div class="actions">' +
        '<button class="btn btn-reschedule" onclick="showReschedule()">RESCHEDULE</button>' +
        '<button class="btn btn-cancel" onclick="cancelBooking()">CANCEL BOOKING</button>' +
      '</div>' +
      '<div id="reschedule-form" class="reschedule-form">' +
        '<label class="form-label">New Date</label>' +
        '<input type="date" class="form-input" id="new-date">' +
        '<label class="form-label">New Time</label>' +
        '<input type="time" class="form-input" id="new-time">' +
        '<button class="btn btn-reschedule" onclick="submitReschedule()">CONFIRM RESCHEDULE</button>' +
      '</div>';
  }
}

function showReschedule() {
  document.getElementById('reschedule-form').style.display = 'block';
}

function submitReschedule() {
  var newDate = document.getElementById('new-date').value;
  var newTime = document.getElementById('new-time').value;
  if (!newDate || !newTime) { alert('Please select a new date and time.'); return; }

  // Format time to 12-hour
  var parts = newTime.split(':');
  var h = parseInt(parts[0]);
  var m = parts[1];
  var ampm = h >= 12 ? 'PM' : 'AM';
  if (h > 12) h -= 12;
  if (h === 0) h = 12;
  var formattedTime = h + ':' + m + ' ' + ampm;

  // Format date to "APR 5, 2026"
  var months = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
  var d = new Date(newDate + 'T00:00:00');
  var formattedDate = months[d.getMonth()] + ' ' + d.getDate() + ', ' + d.getFullYear();

  fetch('/api/reschedule', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ booking_id: bookingId, new_date: formattedDate, new_time: formattedTime })
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    if (data.success) {
      document.getElementById('actions').innerHTML = '<div class="success-msg">Your booking has been rescheduled to ' + formattedDate + ' at ' + formattedTime + '!</div><div class="actions"><a href="/" class="btn btn-rebook">BACK TO BOOKING</a></div>';
      document.getElementById('reschedule-form').style.display = 'none';
      loadBooking();
    } else {
      alert('Error: ' + (data.error || 'Could not reschedule.'));
    }
  })
  .catch(function() { alert('Something went wrong. Please try again.'); });
}

function cancelBooking() {
  if (!confirm('Are you sure you want to cancel your booking?')) return;

  fetch('/api/cancel', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ booking_id: bookingId })
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    if (data.success) {
      document.getElementById('actions').innerHTML = '<div class="success-msg">Your booking has been cancelled.</div><div class="actions"><a href="/" class="btn btn-rebook">BOOK A NEW SESSION</a></div>';
      loadBooking();
    } else {
      alert('Error: ' + (data.error || 'Could not cancel.'));
    }
  })
  .catch(function() { alert('Something went wrong. Please try again.'); });
}
</script>
</body>
</html>
